# O04 — Build & publish container images to GHCR
#
# Pushes images for the four first-party services on every push to main and
# every semver tag. FreeSWITCH is built only when a SIGNALWIRE_TOKEN secret is
# configured (Phase 1 — FS image build is gated behind paywalled apt repo).
#
# Per PLAN §6: tags written are
#   - sha-<short>     (immutable, deploy reference)
#   - <branch>        (main only, mutable "tip")
#   - <semver-set>    (only on tag push: 1.2.3, 1.2, 1)
#   - latest          (default branch only)
#
# Provenance attestation + SBOM are emitted per PLAN §7.

name: build

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      services:
        description: "Comma-separated services to build (default: all)"
        required: false
        default: "api,dialer,workers,web"

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  build-service:
    name: build / ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        service: [api, dialer, workers, web]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - name: Compute lowercase owner (GHCR requires lowercase)
        id: owner
        run: |
          echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.value }}/vici2-${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}-amd64
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}-amd64

      - name: Generate SBOM (syft, CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ steps.owner.outputs.value }}/vici2-${{ matrix.service }}@${{ steps.push.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom-${{ matrix.service }}.cdx.json
          upload-artifact: true
          upload-artifact-retention: 90

      - name: Attest build provenance (SLSA L3)
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ steps.owner.outputs.value }}/vici2-${{ matrix.service }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Attest SBOM
        uses: actions/attest-sbom@v2
        with:
          subject-name: ghcr.io/${{ steps.owner.outputs.value }}/vici2-${{ matrix.service }}
          subject-digest: ${{ steps.push.outputs.digest }}
          sbom-path: sbom-${{ matrix.service }}.cdx.json
          push-to-registry: true

  build-freeswitch:
    name: build / freeswitch
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Only run when SIGNALWIRE_TOKEN is available (FS image requires it).
    # `secrets` are not evaluable in `if:` directly, so we early-skip in the step.
    steps:
      - uses: actions/checkout@v4
      - name: Skip if token absent
        id: gate
        env:
          SIGNALWIRE_TOKEN: ${{ secrets.SIGNALWIRE_TOKEN }}
        run: |
          if [ -z "${SIGNALWIRE_TOKEN:-}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::SIGNALWIRE_TOKEN not set — skipping FreeSWITCH image build."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v4
        if: steps.gate.outputs.skip == 'false'

      - name: Compute lowercase owner
        if: steps.gate.outputs.skip == 'false'
        id: owner
        run: |
          echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        if: steps.gate.outputs.skip == 'false'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        if: steps.gate.outputs.skip == 'false'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.value }}/vici2-freeswitch
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push FreeSWITCH image
        if: steps.gate.outputs.skip == 'false'
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: freeswitch/Dockerfile
          push: true
          build-args: |
            SIGNALWIRE_TOKEN=${{ secrets.SIGNALWIRE_TOKEN }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=freeswitch-amd64
          cache-to: type=gha,mode=max,scope=freeswitch-amd64

      - name: Attest provenance (FreeSWITCH)
        if: steps.gate.outputs.skip == 'false'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ steps.owner.outputs.value }}/vici2-freeswitch
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
