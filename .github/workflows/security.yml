# O04 — Security scanning
#
# Bundles everything that is not a per-PR blocking check (those live in ci.yml
# and dependency-review.yml):
#   - Trivy filesystem + config scan (every push + weekly)
#   - Trivy image scan against latest GHCR images (weekly)
#   - syft SBOM of the repo (weekly, uploaded as artifact)
#   - gitleaks history scan (every push + PR — see also: secrets-scan.yml stub)
#
# CodeQL lives in its own workflow when enabled. See PLAN §2.6.
#
# SARIF uploads land in the GitHub Security tab.

name: security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 7 * * 1" # Mon 07:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  gitleaks:
    name: gitleaks (history)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Skip license check (we are public OSS, no paid GHCR license).
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"

  trivy-fs:
    name: trivy (filesystem)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          # Don't fail the PR — surface via Security tab. CI tightens
          # later by flipping exit-code to 1 once baseline is clean.
          exit-code: "0"
      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  trivy-config:
    name: trivy (config / IaC)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Trivy config scan (Dockerfiles, compose, k8s, terraform)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

  trivy-image:
    name: trivy (image) / ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only on schedule + manual — image scans need GHCR images to exist.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        service: [api, dialer, workers, web]
    steps:
      - name: Compute lowercase owner
        id: owner
        run: |
          echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ steps.owner.outputs.value }}/vici2-${{ matrix.service }}:latest
          format: sarif
          output: trivy-image-${{ matrix.service }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-${{ matrix.service }}.sarif
          category: trivy-image-${{ matrix.service }}

  sbom-repo:
    name: sbom (repo, syft)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom-repo.cdx.json
          upload-artifact: true
          upload-artifact-retention: 90

  dependency-review:
    name: dependency-review (PR)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, MPL-2.0, Unlicense, 0BSD, CC0-1.0
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0, LGPL-2.0, LGPL-3.0, SSPL-1.0
          comment-summary-in-pr: on-failure
