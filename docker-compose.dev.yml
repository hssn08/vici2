# vici2 — local dev stack.
# Per F01 PLAN §3. Single source of truth for `make dev`.
# macOS overrides live in docker-compose.macos.yml.

name: vici2

x-common-env: &common-env
  TZ: UTC
  LOG_LEVEL: ${LOG_LEVEL:-info}
  NODE_ENV: ${NODE_ENV:-development}
  GO_ENV: ${GO_ENV:-development}

services:
  mysql:
    image: mysql:8.0.40
    container_name: vici2_mysql
    restart: unless-stopped
    # Per F02 PLAN §2.1: full tuning lives in infra/mysql/my.cnf, mounted
    # at /etc/mysql/conf.d/vici2.cnf. The container CLI flags here are
    # intentionally minimal (only what every layer needs).
    environment:
      MYSQL_ROOT_PASSWORD: ${VICI2_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${VICI2_DB_NAME}
      MYSQL_USER: ${VICI2_DB_USER}
      MYSQL_PASSWORD: ${VICI2_DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/mysql/my.cnf:/etc/mysql/conf.d/vici2.cnf:ro
      - ./infra/mysql/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "3306:3306"
    healthcheck:
      # Verifies the app DB exists in addition to ping (catches half-init
      # states where the container is up but data dir initialisation
      # failed).
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -u ${VICI2_DB_USER} -p${VICI2_DB_PASSWORD} && mysql -u ${VICI2_DB_USER} -p${VICI2_DB_PASSWORD} -e 'SELECT 1 FROM ${VICI2_DB_NAME}.tenants LIMIT 1' >/dev/null 2>&1 || mysql -u ${VICI2_DB_USER} -p${VICI2_DB_PASSWORD} -e 'USE ${VICI2_DB_NAME}'",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks: [vici2_default]

  # F04 PLAN §1, §8: Valkey replaces Redis (license: BSD-3-Clause vs
  # Redis 7.4 RSAL/SSPL+AGPL). Wire-compatible — clients unmodified.
  # `redis://valkey:6379/...` URLs work because the protocol is identical.
  valkey:
    image: valkey/valkey:8.0-alpine
    container_name: vici2_valkey
    restart: unless-stopped
    command: ["valkey-server", "/etc/valkey/valkey.conf"]
    volumes:
      - valkey_data:/data
      - ./infra/valkey/valkey.conf:/etc/valkey/valkey.conf:ro
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 5
      start_period: 5s
    networks: [vici2_default]

  # ---------------------------------------------------------------------------
  # X01: rtpengine sidecar — SRTP offload for FreeSWITCH WebRTC sessions.
  # Runs in network_mode: host (same as freeswitch) so loopback RTP works and
  # the kernel module (xt_RTPENGINE) can be used in production.
  # Dev default: RTPENGINE_KERNEL_MODE=0 (userspace mode, no kernel module needed).
  # Production: set RTPENGINE_KERNEL_MODE=1 after loading xt_RTPENGINE on host.
  # See infra/rtpengine/KERNEL_MODULE.md for kernel module setup instructions.
  # ---------------------------------------------------------------------------
  rtpengine:
    build:
      context: ./infra/rtpengine
    image: vici2/rtpengine:mr12.5
    container_name: vici2_rtpengine
    restart: unless-stopped
    # Must share host network with freeswitch for loopback RTP and kernel mode.
    network_mode: host
    cap_add:
      # NET_ADMIN: required for kernel mode nftables rule installation.
      # SYS_MODULE: required for kernel module interaction.
      # In userspace mode (dev), these caps are unused but harmless.
      - NET_ADMIN
      - SYS_MODULE
    environment:
      RTPENGINE_INTERFACE: "0.0.0.0"
      RTPENGINE_NG_PORT: "22222"
      RTPENGINE_PORT_MIN: "30000"
      RTPENGINE_PORT_MAX: "40000"
      RTPENGINE_TOS: "184"
      RTPENGINE_LOG_LEVEL: "${RTPENGINE_LOG_LEVEL:-5}"
      RTPENGINE_PROMETHEUS_PORT: "9109"
      # Set to "1" on Linux production hosts after loading xt_RTPENGINE kernel module.
      RTPENGINE_KERNEL_MODE: "${RTPENGINE_KERNEL_MODE:-0}"
      RTPENGINE_RECORDING_DIR: "/var/lib/rtpengine/recordings"
    volumes:
      - rtpengine_recordings:/var/lib/rtpengine/recordings
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    # rtpengine does not join vici2_default (network_mode: host bypasses bridge).
    # freeswitch's mod_rtpengine communicates via 127.0.0.1:22222 (loopback).
    # pass-through=true in rtpengine.conf.xml handles startup races gracefully.

  freeswitch:
    build:
      context: ./freeswitch
      args:
        FREESWITCH_VERSION: "1.10.12"
        SIGNALWIRE_TOKEN: ${SIGNALWIRE_TOKEN}
    image: vici2/freeswitch:1.10.12
    container_name: vici2_freeswitch
    restart: unless-stopped
    network_mode: host
    cap_add:
      - SYS_NICE
      - IPC_LOCK
    # F03 PLAN §11.2 — stack=240 KB is the single biggest mitigation for the
    # Artoo R2D2 ~1796-thread wall (RESEARCH §9.1). nofile/nproc tuned for
    # high-call-volume; rtprio enables real-time scheduling for the RTP thread.
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
      nproc: 65535
      stack: 245760
      core: -1
      memlock: -1
      rtprio: 99
    volumes:
      - ./freeswitch/conf:/etc/freeswitch:ro
      - ./freeswitch/tls:/etc/freeswitch/tls:ro
      - freeswitch_recordings:/var/lib/freeswitch/recordings
      - freeswitch_log:/var/log/freeswitch
    environment:
      <<: *common-env
      FS_EVENT_SOCKET_PASSWORD: ${FS_EVENT_SOCKET_PASSWORD}
      FS_DEFAULT_SIP_PASSWORD: ${FS_DEFAULT_SIP_PASSWORD}
      FS_XMLCURL_USER: ${FS_XMLCURL_USER}
      FS_XMLCURL_PASS: ${FS_XMLCURL_PASS}
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
      target: dev
    image: vici2/api:dev
    container_name: vici2_api
    restart: unless-stopped
    environment:
      <<: *common-env
      PORT: ${API_HTTP_PORT:-3000}
      METRICS_PORT: ${API_METRICS_PORT:-9101}
      DATABASE_URL: mysql://${VICI2_DB_USER}:${VICI2_DB_PASSWORD}@mysql:3306/${VICI2_DB_NAME}
      # F04 PLAN §7.1: VALKEY_URL is the preferred env; REDIS_URL kept
      # for back-compat with code still on the old name.
      VALKEY_URL: redis://valkey:6379/0
      REDIS_URL: redis://valkey:6379/0
      FS_ESL_HOST: host.docker.internal
      FS_ESL_PORT: 8021
      FS_EVENT_SOCKET_PASSWORD: ${FS_EVENT_SOCKET_PASSWORD}
      API_JWT_SECRET: ${API_JWT_SECRET}
      VICI2_DEFAULT_TENANT_ID: ${VICI2_DEFAULT_TENANT_ID:-1}
    ports:
      - "${API_HTTP_PORT:-3000}:3000"
      - "${API_METRICS_PORT:-9101}:9101"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql: { condition: service_healthy }
      valkey: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    develop:
      watch:
        - action: sync
          path: ./api/src
          target: /app/api/src
          ignore:
            - node_modules/
        - action: sync
          path: ./shared
          target: /app/shared
        - action: rebuild
          path: ./api/package.json
        - action: rebuild
          path: ./api/prisma/schema.prisma
    networks: [vici2_default]

  dialer:
    build:
      context: ./dialer
      target: dev
    image: vici2/dialer:dev
    container_name: vici2_dialer
    restart: unless-stopped
    environment:
      <<: *common-env
      METRICS_PORT: ${DIALER_METRICS_PORT:-9102}
      GRPC_PORT: ${DIALER_GRPC_PORT:-7000}
      DATABASE_DSN: ${VICI2_DB_USER}:${VICI2_DB_PASSWORD}@tcp(mysql:3306)/${VICI2_DB_NAME}?parseTime=true
      # F04 PLAN §7.1: VALKEY_URL is the preferred env; REDIS_URL kept
      # for back-compat with code still on the old name.
      VALKEY_URL: redis://valkey:6379/0
      REDIS_URL: redis://valkey:6379/0
      FS_ESL_HOST: host.docker.internal
      FS_ESL_PORT: 8021
      FS_EVENT_SOCKET_PASSWORD: ${FS_EVENT_SOCKET_PASSWORD}
    ports:
      - "${DIALER_METRICS_PORT:-9102}:9102"
      - "${DIALER_GRPC_PORT:-7000}:7000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql: { condition: service_healthy }
      valkey: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9102/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    develop:
      watch:
        - action: sync
          path: ./dialer
          target: /app
          ignore:
            - tmp/
            - bin/
        - action: rebuild
          path: ./dialer/go.mod
    networks: [vici2_default]

  workers:
    build:
      context: .
      dockerfile: workers/Dockerfile
      target: dev
    image: vici2/workers:dev
    container_name: vici2_workers
    restart: unless-stopped
    environment:
      <<: *common-env
      METRICS_PORT: ${WORKERS_METRICS_PORT:-9103}
      DATABASE_URL: mysql://${VICI2_DB_USER}:${VICI2_DB_PASSWORD}@mysql:3306/${VICI2_DB_NAME}
      # F04 PLAN §7.1: VALKEY_URL is the preferred env; REDIS_URL kept
      # for back-compat with code still on the old name.
      VALKEY_URL: redis://valkey:6379/0
      REDIS_URL: redis://valkey:6379/0
    ports:
      - "${WORKERS_METRICS_PORT:-9103}:9103"
    depends_on:
      mysql: { condition: service_healthy }
      valkey: { condition: service_healthy }
    stop_grace_period: 300s
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9103/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    develop:
      watch:
        - action: sync
          path: ./workers/src
          target: /app/workers/src
        - action: sync
          path: ./shared
          target: /app/shared
        - action: rebuild
          path: ./workers/package.json
    networks: [vici2_default]

  recording-uploader:
    build:
      context: .
      dockerfile: workers/recording-uploader/Dockerfile
      target: dev
    image: vici2/recording-uploader:dev
    container_name: vici2_recording_uploader
    restart: unless-stopped
    environment:
      <<: *common-env
      R02_METRICS_PORT: ${R02_METRICS_PORT:-9104}
      R02_CONCURRENCY: ${R02_CONCURRENCY:-10}
      R02_SWEEPER_INTERVAL_SEC: ${R02_SWEEPER_INTERVAL_SEC:-300}
      DATABASE_URL: mysql://${VICI2_DB_USER}:${VICI2_DB_PASSWORD}@mysql:3306/${VICI2_DB_NAME}?connection_limit=20
      VALKEY_URL: redis://valkey:6379/0
      REDIS_URL: redis://valkey:6379/0
    volumes:
      - recordings:/recordings
    ports:
      - "${R02_METRICS_PORT:-9104}:9104"
    depends_on:
      mysql: { condition: service_healthy }
      valkey: { condition: service_healthy }
    stop_grace_period: 60s
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9104/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks: [vici2_default]

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      target: dev
    image: vici2/web:dev
    container_name: vici2_web
    restart: unless-stopped
    environment:
      <<: *common-env
      PORT: ${WEB_PORT:-4000}
      WATCHPACK_POLLING: "true"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    ports:
      - "${WEB_PORT:-4000}:4000"
    depends_on:
      api: { condition: service_healthy }
    develop:
      watch:
        - action: sync
          path: ./web/src
          target: /app/web/src
        - action: sync
          path: ./shared
          target: /app/shared
        - action: rebuild
          path: ./web/package.json
    networks: [vici2_default]

  # ---------------------------------------------------------------------------
  # O01 observability stack: Prometheus 3.x + Alertmanager 0.27+ + Grafana 11.x
  # plus mysqld/redis/node exporters. See spec/modules/O01/PLAN.md.
  # All services join vici2_default so they resolve api/dialer/workers/mysql/redis
  # by service name. Cardinality discipline enforced by promtool in CI.
  # ---------------------------------------------------------------------------

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: vici2_prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
      - --web.enable-remote-write-receiver
      - --enable-feature=native-histograms
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      alertmanager: { condition: service_healthy }
    networks: [vici2_default]

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: vici2_alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ./infra/observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9093/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [vici2_default]

  grafana:
    image: grafana/grafana-oss:11.4.0
    container_name: vici2_grafana
    restart: unless-stopped
    environment:
      <<: *common-env
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: ""
    volumes:
      - ./infra/observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      # 3000 is taken by api; Grafana lives on 3001 host-side.
      - "${GRAFANA_PORT:-3001}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      prometheus: { condition: service_healthy }
    networks: [vici2_default]

  mysqld-exporter:
    image: prom/mysqld-exporter:v0.16.0
    container_name: vici2_mysqld_exporter
    restart: unless-stopped
    command:
      - --collect.global_status
      - --collect.global_variables
      - --collect.info_schema.innodb_metrics
      - --collect.info_schema.innodb_cmp
      - --collect.info_schema.innodb_cmpmem
      - --collect.perf_schema.eventsstatementssum
      - --collect.engine_innodb_status
      - --no-collect.info_schema.processlist
      - --no-collect.perf_schema.eventswaits
      - --web.listen-address=:9105
    environment:
      DATA_SOURCE_NAME: "${VICI2_DB_USER}:${VICI2_DB_PASSWORD}@(mysql:3306)/"
    ports:
      - "${MYSQLD_EXPORTER_PORT:-9105}:9105"
    depends_on:
      mysql: { condition: service_healthy }
    networks: [vici2_default]

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: vici2_redis_exporter
    restart: unless-stopped
    command:
      - --redis.addr=redis://redis:6379
      - --web.listen-address=:9106
    ports:
      - "${REDIS_EXPORTER_PORT:-9106}:9106"
    depends_on:
      redis: { condition: service_healthy }
    networks: [vici2_default]

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: vici2_node_exporter
    restart: unless-stopped
    pid: host
    command:
      - --path.rootfs=/host
      - --no-collector.wifi
      - --no-collector.ipvs
      - --no-collector.textfile
      - --web.listen-address=:9107
    volumes:
      - /:/host:ro,rslave
    ports:
      - "${NODE_EXPORTER_PORT:-9107}:9107"
    networks: [vici2_default]

  # ---------------------------------------------------------------------------
  # X02: Kamailio SIP dispatcher — load balances to FreeSWITCH pool.
  # Two replicas in production (active-passive VRRP behind VIP 10.0.0.100).
  # In dev: single instance on bridge network; no keepalived needed.
  # rtpengine (X01) must be up first for SDP rewrite to work; guarded in
  # router.lua with pcall so Kamailio starts cleanly without rtpengine.
  # ---------------------------------------------------------------------------
  kamailio:
    build:
      context: ./infra/kamailio
    image: vici2/kamailio:6.0
    container_name: vici2_kamailio
    restart: unless-stopped
    environment:
      # MySQL URL for dispatcher + permissions tables (kamailio schema)
      KAMAILIO_DB_URL: >-
        mysql://${KAMAILIO_DB_USER:-kamailio}:${KAMAILIO_DB_PASS:-kamailio}@mysql:3306/${KAMAILIO_DB_NAME:-kamailio}
      # rtpengine ng-control socket (X01)
      RTPENGINE_HOST: "${RTPENGINE_HOST:-rtpengine}"
      RTPENGINE_NG_PORT: "${RTPENGINE_NG_PORT:-22222}"
      # Topology hiding: mask internal FS IPs from carriers
      TOPOH_SECRET: "${TOPOH_SECRET:-dev-topoh-secret-change-in-prod}"
      KAMAILIO_PUBLIC_IP: "${KAMAILIO_PUBLIC_IP:-127.0.0.1}"
      KAMAILIO_DOMAIN: "${KAMAILIO_DOMAIN:-kamailio.local}"
      # SIP port for healthcheck.sh
      KAMAILIO_SIP_PORT: "5060"
    ports:
      - "${KAMAILIO_SIP_PORT:-5060}:5060/udp"
      - "${KAMAILIO_SIP_PORT:-5060}:5060/tcp"
      - "${KAMAILIO_SIP_TLS_PORT:-5061}:5061/tcp"
      - "${KAMAILIO_WSS_PORT:-7443}:7443/tcp"
      - "${KAMAILIO_METRICS_PORT:-9190}:9090/tcp"
      - "${KAMAILIO_JSONRPC_PORT:-8080}:8080/tcp"
    depends_on:
      mysql: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "/usr/local/bin/kamailio-scripts/healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [vici2_default]

volumes:
  mysql_data:
  valkey_data:
  freeswitch_recordings:
  freeswitch_log:
  prometheus_data:
  alertmanager_data:
  grafana_data:
  # X01: rtpengine diagnostic PCAP recordings (not primary recording; see R01).
  rtpengine_recordings:

networks:
  vici2_default:
    driver: bridge
