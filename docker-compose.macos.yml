# macOS overlay for docker-compose.dev.yml.
# Docker Desktop on macOS doesn't truly support `network_mode: host`, so we
# fall back to bridge mode and explicit port mappings. RTP range is reduced
# (~25 simultaneous calls) for sanity; raise as needed for load testing.

services:
  freeswitch:
    network_mode: ""
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "5080:5080/udp"
      - "5080:5080/tcp"
      - "7443:7443/tcp"
      - "8021:8021/tcp"
      - "16384-16484:16384-16484/udp"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [vici2_default]
