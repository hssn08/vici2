# macOS overlay for docker-compose.dev.yml.
# Docker Desktop on macOS doesn't truly support `network_mode: host`, so we
# fall back to bridge mode and explicit port mappings. RTP range is reduced
# (~25 simultaneous calls) for sanity; raise as needed for load testing.
#
# X01 note: rtpengine also overrides to bridge mode on Mac. The ng-control
# address for mod_rtpengine changes from 127.0.0.1 to the Docker service name
# "rtpengine". Full DTLS-SRTP media flow from browsers is limited on Mac Docker
# Desktop due to NAT; use a Linux VM for full load testing. See PLAN.md §4.10.

services:
  freeswitch:
    network_mode: ""
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "5080:5080/udp"
      - "5080:5080/tcp"
      - "7443:7443/tcp"
      - "8021:8021/tcp"
      - "16384-16484:16384-16484/udp"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [vici2_default]

  # X01: rtpengine Mac bridge override.
  # On Mac, network_mode: host doesn't share the host network stack, so we
  # switch to bridge mode. mod_rtpengine must reach rtpengine via the bridge
  # DNS name "rtpengine" instead of 127.0.0.1.
  # Note: port publishing 30000-31000 (1,000 ports) is intentionally smaller
  # than the Linux range to avoid Docker Desktop startup delays with 10k ports.
  rtpengine:
    network_mode: ""
    networks: [vici2_default]
    environment:
      # Kernel module is never available on Mac; force userspace mode.
      RTPENGINE_KERNEL_MODE: "0"
    ports:
      - "22222:22222/udp"
      - "9109:9109/tcp"
      # Reduced port range for Mac Docker Desktop (avoids slow 10k-port publish).
      # Supports ~250 concurrent bridged calls (1000 ports / 4 ports per call).
      - "30000-31000:30000-31000/udp"

  # X02: Kamailio Mac override.
  # No changes needed — Kamailio already runs in bridge mode by default.
  # rtpengine is reachable via the Docker service name "rtpengine".
  # TLS/WSS port 7443 maps to host 7443 for browser SIP.js testing.
  kamailio:
    environment:
      # On Mac, rtpengine is on the bridge (not loopback)
      RTPENGINE_HOST: "rtpengine"
