# infra/kamailio/acl-carriers.conf — X02 carrier IP allowlist reference
#
# This file is documentation only. The actual ACL is stored in the MySQL
# kamailio.address table (group 1 = carriers, group 2 = internal).
# Reload after DB changes: kamcmd permissions.reload
#
# Carrier ranges are sourced into the DB via ops procedure:
#   1. Add IP ranges to the MySQL address table (INSERT below)
#   2. kamcmd permissions.reload
#   3. Verify: kamcmd permissions.addressDump
#
# SQL template (run against kamailio DB):
#
# -- Group 1: carrier IPs (inbound SIP allowed from these sources)
# INSERT INTO address (grp, ip_addr, mask, port, tag) VALUES
#   -- Twilio US East (INVITE from SIP gateways)
#   (1, '54.172.60.0',  24, 5060, 'twilio-us-east'),
#   (1, '54.172.60.0',  24, 5061, 'twilio-us-east-tls'),
#   -- Twilio US West
#   (1, '54.244.51.0',  24, 5060, 'twilio-us-west'),
#   -- Telnyx
#   (1, '34.203.250.0', 24, 5060, 'telnyx-us'),
#   -- SignalWire
#   (1, '64.129.229.0', 24, 5060, 'signalwire-us'),
#   -- Group 2: internal Docker network (all methods allowed)
#   (2, '10.0.0.0',      8,  0,   'internal-docker'),
#   (2, '172.16.0.0',   12,  0,   'internal-compose'),
#   (2, '192.168.0.0',  16,  0,   'internal-lan');
#
# To add a new carrier at runtime (without Kamailio restart):
#   mysql -u kamailio -p kamailio -e "INSERT INTO address ..."
#   kamcmd permissions.reload
