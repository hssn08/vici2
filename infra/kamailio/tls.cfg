# infra/kamailio/tls.cfg — X02 Kamailio TLS configuration
#
# Two listeners:
#   :5061 — SIP-TLS (carrier TLS trunks)
#   :7443 — WSS (browser agents via SIP.js)
#
# Certificate files are mounted at runtime via Docker volume/secret:
#   /etc/kamailio/tls/server.crt  — public certificate (Let's Encrypt in prod)
#   /etc/kamailio/tls/server.key  — private key
#   /etc/kamailio/tls/ca-bundle.crt — CA chain (for client cert validation, optional)
#
# Dev: generate self-signed cert with entrypoint.sh if files are absent.
# Prod: mount a Let's Encrypt cert (required for browser WSS — browsers reject self-signed).

[server:default]
method              = TLSv1.2+
verify_certificate  = no
require_certificate = no
certificate         = /etc/kamailio/tls/server.crt
private_key         = /etc/kamailio/tls/server.key
ca_list             = /etc/kamailio/tls/ca-bundle.crt
cipher_list         = HIGH:!aNULL:!MD5:!RC4:!EXPORT
session_cache       = off

[client:default]
method              = TLSv1.2+
verify_certificate  = no
require_certificate = no
certificate         = /etc/kamailio/tls/server.crt
private_key         = /etc/kamailio/tls/server.key

# Per-carrier TLS client profiles can be added here for carriers that present
# client certificates for mutual TLS authentication. Example:
#
# [client:twilio]
# method              = TLSv1.2+
# verify_certificate  = yes
# require_certificate = no
# ca_list             = /etc/kamailio/tls/twilio-ca.crt
