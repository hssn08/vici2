####### kamailio.cfg — X02 vici2 SIP dispatcher #######
# Minimal native config: loads modules, sets parameters, delegates routing
# to KEMI Lua script (router.lua). All routing logic lives in router.lua.
#
# Environment variable substitution: DBURL, RTPENGINE_IP, TOPOH_SECRET,
# KAMAILIO_PUBLIC_IP are replaced by entrypoint.sh before launch.
# Do NOT put passwords here directly; use the env vars.

####### Global Parameters #######
debug=2
log_stderror=yes
log_facility=LOG_LOCAL0
log_prefix="{$ci} "

fork=yes
children=8
tcp_children=4
async_workers=4

max_while_loops=100
mhomed=1
dns_try_naptr=0
use_dns_cache=0

# Shared + private memory. Raise for large dispatcher tables.
shm_mem_size=256
pkg_mem_size=16

####### Listeners #######
# entrypoint.sh sets KAMAILIO_IP; defaults to 0.0.0.0 for Docker.
listen=udp:0.0.0.0:5060
listen=tcp:0.0.0.0:5060
listen=tls:0.0.0.0:5061
listen=tls:0.0.0.0:7443

# Prometheus + JSONRPC HTTP listener (xhttp).
# Port 9090 is bound separately by xhttp module via modparam below.
listen=tcp:0.0.0.0:9090
listen=tcp:0.0.0.0:8080

####### Modules Section #######
mpath="/usr/lib/x86_64-linux-gnu/kamailio/modules/"

# Core
loadmodule "kex.so"
loadmodule "corex.so"

# Transaction management
loadmodule "tm.so"
loadmodule "tmx.so"

# Stateless replies
loadmodule "sl.so"

# Record-Route + loose routing
loadmodule "rr.so"

# Pseudo-variables
loadmodule "pv.so"

# Max-Forwards processing
loadmodule "maxfwd.so"

# Text operations
loadmodule "textops.so"

# SIP utilities (is_method, etc.)
loadmodule "siputils.so"

# Logging
loadmodule "xlog.so"

# Sanity checks (malformed SIP rejection)
loadmodule "sanity.so"

# Control socket (kamcmd)
loadmodule "ctl.so"

# RPC config
loadmodule "cfg_rpc.so"

# MI (Management Interface) over RPC
loadmodule "mi_rpc.so"

# JSONRPC over HTTP (management API)
loadmodule "jsonrpcs.so"

# MySQL DB connector
loadmodule "db_mysql.so"

# Dispatcher (load balancing + health probing)
loadmodule "dispatcher.so"

# Permissions (ACL carrier whitelist)
loadmodule "permissions.so"

# Pike (anti-flood rate limiting)
loadmodule "pike.so"

# Hash tables (per-FS metrics, tenant map)
loadmodule "htable.so"

# NAT detection + keep-alive
loadmodule "nathelper.so"

# Topology hiding (hides FS IPs from carriers)
loadmodule "topoh.so"

# rtpengine control (X01 SRTP offload)
loadmodule "rtpengine.so"

# HTTP server (Prometheus + JSONRPC)
loadmodule "xhttp.so"
loadmodule "xhttp_prom.so"

# KEMI Lua routing engine
loadmodule "app_lua.so"

# Periodic timer (dispatcher reload, etc.)
loadmodule "rtimer.so"

# TLS (SIP-TLS :5061 + WSS :7443)
loadmodule "tls.so"

####### Module Parameters #######

# ----- TLS -----
modparam("tls", "config", "/etc/kamailio/tls.cfg")

# ----- Transaction management -----
# failure_reply_mode=3: propagate branch failures to failure route
modparam("tm", "failure_reply_mode", 3)
# fr_timeout: 5s wait for non-INVITE response
modparam("tm", "fr_timeout", 5)
# fr_inv_timeout: 120s wait for final INVITE response (call setup SLA)
modparam("tm", "fr_inv_timeout", 120)
modparam("tm", "restart_fr_on_each_reply", 0)

# ----- Record-Route -----
modparam("rr", "enable_full_lr", 1)
modparam("rr", "append_fromtag", 1)

# ----- Dispatcher -----
# DBURL is substituted by entrypoint.sh from KAMAILIO_DB_URL env var.
modparam("dispatcher", "db_url", "DBURL")
modparam("dispatcher", "table_name", "dispatcher")
modparam("dispatcher", "ds_ping_method", "OPTIONS")
modparam("dispatcher", "ds_ping_interval", 15)
# probing_mode=1: probe ALL destinations actively (detect dead FS before calls hit it)
modparam("dispatcher", "ds_probing_mode", 1)
modparam("dispatcher", "ds_inactive_threshold", 3)
modparam("dispatcher", "ds_restore_threshold", 2)
# 200=pong OK; 404=no user (FS up); 486=busy (FS up). Exclude 408 to detect FS timeouts.
modparam("dispatcher", "ds_ping_reply_codes", "200|404|486")
# Start all destinations as reachable on first load (before probes run)
modparam("dispatcher", "ds_db_default_reachable", 1)
# Also load fallback flat file if DB is unavailable at startup
modparam("dispatcher", "list_file", "/etc/kamailio/dispatcher.list")

# ----- Permissions (ACL) -----
modparam("permissions", "db_url", "DBURL")
modparam("permissions", "address_table", "address")

# ----- Pike (rate limiting) -----
# 30 requests per 2-second window = 15 req/s max per source IP
modparam("pike", "sampling_time_unit", 2)
modparam("pike", "reqs_density_per_unit", 30)
modparam("pike", "remove_latency", 4)

# ----- Topology hiding -----
# TOPOH_SECRET and KAMAILIO_PUBLIC_IP replaced by entrypoint.sh
modparam("topoh", "mask_key", "TOPOH_SECRET")
modparam("topoh", "mask_ip", "KAMAILIO_PUBLIC_IP")
modparam("topoh", "mask_callid", 0)

# ----- NAT helper -----
modparam("nathelper", "natping_interval", 30)
modparam("nathelper", "ping_nated_only", 1)
modparam("nathelper", "sipping_bflag", 7)

# ----- rtpengine (X01) -----
# RTPENGINE_SOCK replaced by entrypoint.sh (e.g. "udp:127.0.0.1:22222")
modparam("rtpengine", "rtpengine_sock", "RTPENGINE_SOCK")

# ----- htable -----
# fsload: per-FS session count cache (populated by check_fs_load.py via kamcmd)
modparam("htable", "htable", "fsload=>size=16;autoexpire=0")
# tenantfs: tenant-id → FS set mapping (loaded at startup)
modparam("htable", "htable", "tenantfs=>size=32;autoexpire=0")

# ----- xhttp (HTTP server) -----
# Prometheus metrics endpoint on :9090
modparam("xhttp", "url_skip", "favicon")

# ----- Prometheus (xhttp_prom) -----
modparam("xhttp_prom", "xhttp_prom_buf_size", 65536)
modparam("xhttp_prom", "xhttp_prom_stats", "all")
modparam("xhttp_prom", "xhttp_prom_pkg_stats", "yes")
modparam("xhttp_prom", "xhttp_prom_shm_stats", "yes")
modparam("xhttp_prom", "xhttp_prom_uptime_stats", "yes")

# ----- KEMI Lua -----
modparam("app_lua", "load", "/etc/kamailio/router.lua")

# ----- RTtimer -----
# ds_sync: reload dispatcher from MySQL every 60 seconds (keeps both replicas in sync)
modparam("rtimer", "timer", "name=ds_sync;interval=60;mode=1")

####### KEMI dispatch — all routing logic in router.lua #######
cfgengine "lua"
