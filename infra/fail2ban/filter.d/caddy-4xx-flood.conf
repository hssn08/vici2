# =============================================================================
# fail2ban filter: caddy-4xx-flood.conf
# =============================================================================
# Match any 4xx response from Caddy, used by the caddy-4xx-flood jail as a
# lightweight DoS deterrent. High maxretry (30 in 60s) so legitimate
# misconfigured clients are not caught.
#
# Caddy access log format: JSON (see caddy-auth.conf header for example).
# Logpath: /var/log/caddy/access.log
# =============================================================================

[INCLUDES]
before = common.conf

[Definition]
# Match any 4xx status code from the JSON access log.
failregex = ^.*"remote_ip":"<HOST>".*"status":4\d\d.*$
            ^.*"status":4\d\d.*"remote_ip":"<HOST>".*$

ignoreregex =
