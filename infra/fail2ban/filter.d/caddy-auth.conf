# =============================================================================
# fail2ban filter: caddy-auth.conf
# =============================================================================
# Match 401/403 responses on Caddy login and auth-refresh endpoints.
# Used by the caddy-auth jail to block password-spray and brute-force attempts.
#
# Caddy access log format (JSON, configured in Caddyfile):
#   {"level":"info","ts":1747130400.123,"logger":"http.log.access","msg":"handled request",
#    "request":{"method":"POST","host":"vici2.example.com",
#               "uri":"/api/auth/login","remote_ip":"203.0.113.42",...},
#    "status":401,"size":42,"duration":0.012}
#
# Logpath: /var/log/caddy/access.log
# =============================================================================

[INCLUDES]
before = common.conf

[Definition]
# JSON log from Caddy — match 401 or 403 on authentication endpoints.
# Matches the "remote_ip" field from the request object.
failregex = ^.*"remote_ip":"<HOST>".*"uri":"(?:/api/auth/login|/api/auth/refresh|/auth/login|/auth/refresh|/api/auth/totp/verify)".*"status":(?:401|403).*$
            ^.*"uri":"(?:/api/auth/login|/api/auth/refresh|/auth/login|/auth/refresh|/api/auth/totp/verify)".*"remote_ip":"<HOST>".*"status":(?:401|403).*$

ignoreregex =
