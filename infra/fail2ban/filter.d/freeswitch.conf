# =============================================================================
# fail2ban filter: freeswitch.conf
# =============================================================================
# FreeSWITCH 1.10.7+ log format (post-2022 regex; breaks on <=1.10.6).
# Source: upstream fail2ban master config/filter.d/freeswitch.conf
# Reference: https://github.com/fail2ban/fail2ban/blob/master/config/filter.d/freeswitch.conf
# Reference: https://wiki.freeswitch.org/wiki/Fail2ban
#
# Modes:
#   mode=normal — match SIP auth FAILURES only (not challenges).
#                 Use for the main freeswitch jail. Avoids banning phones
#                 that keep challenging (normal SIP behavior).
#   mode=ddos   — match challenges + failures. Higher maxretry threshold
#                 to catch scanner floods (sipcli, sipvicious) without
#                 banning real phones whose networks are flappy.
#   mode=extra  — additional patterns for log sources beyond mod_sofia
#
# Jail selects mode via:
#   [freeswitch]
#   filter = freeswitch[mode=normal]
#
#   [freeswitch-dos]
#   filter = freeswitch[mode=ddos]
#
# Required FreeSWITCH configuration (every sofia profile):
#   <param name="log-auth-failures" value="true"/>
#   <param name="log-auth-failures-as-warnings" value="true"/>
# =============================================================================

[INCLUDES]
before = common.conf

[Definition]
# Option: mode
# Notes.: set the desired mode for filtering. Supported modes:
#   normal - match failed authentication only
#   ddos   - match both challenges and failures (broader, higher maxretry)
#   extra  - additional patterns (module-specific)
# Values: [ normal | ddos | extra ]
mode = normal

_daemon = freeswitch

# FS 1.10.7+ log line prefix example:
# 2026-01-15 03:12:45.123456 [WARNING] sofia_reg.c:3342 SIP auth failure (REGISTER) on sofia profile 'internal' for [sip:1001@192.168.1.5] from ip 203.0.113.42
# 2026-01-15 03:12:45.123456 [INFO]    sofia_reg.c:3123 SIP auth challenge (REGISTER) on sofia profile 'internal' for [sip:unknown@192.168.1.5] from ip 203.0.113.42

failregex = ^%(__prefix_line)s\[(?:WARNING|NOTICE|INFO|ERROR)\]\s+sofia_reg\.c:\d+\s+SIP auth failure \(\S+\) on sofia profile '[^']+' for \[sip:[^\]]+\] from ip <HOST>$

ignoreregex =

[normal]
failregex = ^%(__prefix_line)s\[(?:WARNING|NOTICE|INFO|ERROR)\]\s+sofia_reg\.c:\d+\s+SIP auth failure \(\S+\) on sofia profile '[^']+' for \[sip:[^\]]+\] from ip <HOST>$

ignoreregex =

[ddos]
# Matches both challenges and failures — higher maxretry threshold in jail.
failregex = ^%(__prefix_line)s\[(?:WARNING|NOTICE|INFO|ERROR)\]\s+sofia_reg\.c:\d+\s+SIP auth (?:failure|challenge) \(\S+\) on sofia profile '[^']+' for \[sip:[^\]]+\] from ip <HOST>$

ignoreregex =

[extra]
# Catch mod_event_socket registration failures and other FS modules.
failregex = ^%(__prefix_line)s\[WARNING\]\s+\S+:\d+\s+SIP auth failure \(\S+\) on sofia profile '[^']+' for \[sip:[^\]]+\] from ip <HOST>$
            ^%(__prefix_line)s\[WARNING\]\s+sofia_reg\.c:\d+\s+SIP auth failure.*from ip <HOST>$

ignoreregex =
