# infra/keepalived/keepalived.conf
# X02 — VRRP VIP for Kamailio active-passive HA.
#
# Deploy: copy to /etc/keepalived/keepalived.conf on both Kamailio hosts.
# On MASTER  (10.0.0.10): state MASTER, priority 100 (already set below).
# On BACKUP  (10.0.0.11): change state to BACKUP and priority to 90.
#
# VIP: 10.0.0.100/24 floats between the two Kamailio nodes.
# Failover time: ≤10 seconds (advert_int=1, fall=3 → 3s VRRP + 6s script).
#
# Health check script: /usr/local/bin/kamailio-scripts/healthcheck.sh
#   Exit 0 = healthy; non-zero = reduces this node's priority by weight (-60),
#   causing the BACKUP to win the election and take the VIP.

global_defs {
    router_id KAMAILIO_A
    # On BACKUP node, change to: router_id KAMAILIO_B
    enable_script_security
    script_user root
}

vrrp_script check_kamailio {
    script "/usr/local/bin/kamailio-scripts/healthcheck.sh"
    interval 2          # run health check every 2 seconds
    timeout  4          # fail if script takes > 4s
    weight  -60         # reduce priority by 60 on failure → BACKUP wins (100-60=40 < 90)
    rise     2          # 2 consecutive successes to restore healthy state
    fall     3          # 3 consecutive failures to trigger failover
}

vrrp_instance KAMAILIO_VIP {
    state      MASTER   # On BACKUP node, change to: state BACKUP
    interface  eth0     # Host network interface carrying the VIP
    virtual_router_id 51
    priority   100      # On BACKUP node, change to: priority 90

    # VRRP advertisement interval: 1s → BACKUP detects MASTER death in ≤3s
    advert_int 1

    # Shared authentication between MASTER and BACKUP (must match on both)
    authentication {
        auth_type PASS
        auth_pass vici2kam1
    }

    # The floating VIP — carriers and agents point to 10.0.0.100
    virtual_ipaddress {
        10.0.0.100/24 dev eth0 label eth0:vip
    }

    # Trigger health check; on failure, priority drops → BACKUP takes over
    track_script {
        check_kamailio
    }

    # When this node becomes MASTER (VIP acquired): reload dispatcher + Lua
    notify_master "/usr/local/bin/kamailio-scripts/kamailio-reload.sh"

    # Optional: notify_backup / notify_fault hooks for monitoring/alerting
    # notify_backup "/usr/local/bin/kamailio-scripts/notify.sh backup"
    # notify_fault  "/usr/local/bin/kamailio-scripts/notify.sh fault"
}

# ---------------------------------------------------------------------------
# SIP listener ports tracked by keepalived for VIP binding
# (keepalived does not open these; Kamailio does — this is informational)
#
# VIP ports:
#   5060/udp+tcp  SIP (carriers + dialer)
#   5061/tcp      SIP-TLS (carrier TLS trunks)
#   7443/tcp      WSS (browser agents via SIP.js)
#   9090/tcp      Prometheus metrics
#   8080/tcp      Kamailio JSONRPC management
# ---------------------------------------------------------------------------
