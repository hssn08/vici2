# vici2 — Valkey 8 baseline config (F04 PLAN §3.1)
#
# This file is mounted read-only at /etc/valkey/valkey.conf in the
# `valkey` container (docker-compose.dev.yml). Production overlays
# add `requirepass`, replication, and tighter `client-output-buffer-limit`.
#
# Engine: Valkey 8.x — BSD-3-Clause — Linux Foundation. See F04 PLAN §1.
#
# Module loading: valkey-bloom (BSD-3) is required for D05 (DNC) and is
# loaded via `loadmodule` at the bottom of this file. If the module file
# is absent the server still boots; the helper lib falls back to an
# in-process Bloom (D05 PLAN §1.5 fail mode "module not loaded").

# === Networking ===
bind 0.0.0.0
port 6379
# protected-mode is OFF in dev because docker-compose binds the port to
# 127.0.0.1 on the host (loopback only). Production overlays MUST set
# `protected-mode yes` together with `requirepass`. (PLAN §3.1 baseline.)
protected-mode no
tcp-keepalive 300
timeout 0

# === Data dir ===
dir /data

# === Persistence — RDB ===
save 3600 1 300 100 60 10000
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
rdb-save-incremental-fsync yes

# === Persistence — AOF ===
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# === Memory ===
# Live state in DB 0 must never silently evict; cache keys in DB 1
# (or split instance) carry explicit TTLs. Hitting maxmemory is a
# loud operator alarm, not a quiet degradation. See PLAN §3.4.
maxmemory 4gb
maxmemory-policy noeviction
maxmemory-samples 5

# === Slow log ===
slowlog-log-slower-than 10000
slowlog-max-len 256

# === Latency monitor ===
latency-monitor-threshold 100

# === Client output buffer ===
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# === Lua / scripts ===
lua-time-limit 5000

# === Stream defaults ===
stream-node-max-bytes 4096
stream-node-max-entries 100

# === Threads (Valkey 8 multi-threaded I/O) ===
io-threads 4
io-threads-do-reads yes

# === Modules ===
# valkey-bloom is required by D05 (DNC). The Dockerfile copies the
# compiled .so to /opt/valkey-modules/. If it isn't present we still
# allow the server to start (loadmodule is `try` semantics via the
# conditional include below — Valkey will exit if the file is missing,
# so we keep this commented in dev and let the Dockerfile uncomment it
# when the module is built into the image. The helper lib detects
# missing module via `MODULE LIST` and falls back to in-process Bloom.
# loadmodule /opt/valkey-modules/valkey-bloom.so
