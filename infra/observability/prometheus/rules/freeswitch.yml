# vici2 — FreeSWITCH + ESL alerts.
# Source: spec/modules/O01/PLAN.md §3.4.

groups:
  - name: vici2_freeswitch
    interval: 15s
    rules:

      - alert: Vici2ESLDisconnect
        expr: increase(vici2_esl_reconnects_total[5m]) > 3
        for: 5m
        labels:
          severity: warn
          team: oncall
        annotations:
          summary: "ESL reconnecting > 3 times in 5m on {{ $labels.fs_host }}"
          description: "Sustained ESL instability. Check FS load and network."
          runbook: "https://repo/spec/runbooks/oncall.md#Vici2ESLDisconnect"
          dashboard: "/d/freeswitch"

      - alert: Vici2ESLEventLatencyHigh
        expr: |
          histogram_quantile(
            0.99,
            sum by (le, fs_host) (rate(vici2_freeswitch_esl_event_latency_seconds_bucket[5m]))
          ) > 0.5
        for: 5m
        labels:
          severity: warn
          team: oncall
        annotations:
          summary: "ESL event latency p99 > 500ms on {{ $labels.fs_host }}"
          description: "Events arriving stale; dialer reconcile will be slow."
          runbook: "https://repo/spec/runbooks/oncall.md#Vici2ESLEventLatencyHigh"
          dashboard: "/d/freeswitch"

      - alert: Vici2FSConferenceLeak
        expr: |
          vici2_freeswitch_conferences_active
          > (sum(vici2_agent_state_count{state="loggedin"}) * 1.2)
        for: 10m
        labels:
          severity: warn
          team: oncall
        annotations:
          summary: "Conference count exceeds 1.2x logged-in agents"
          description: "Possible conference-per-agent leak (DESIGN §1.3)."
          runbook: "https://repo/spec/runbooks/oncall.md#Vici2FSConferenceLeak"
          dashboard: "/d/freeswitch"

      - alert: Vici2ESLConnectionDown
        expr: vici2_esl_connection_status == 0
        for: 1m
        labels:
          severity: page
          team: oncall
        annotations:
          summary: "ESL connection down on {{ $labels.fs_host }}"
          description: "Dialer cannot originate. Reconnect supervisor should retry but ALERT operations."
          runbook: "https://repo/spec/runbooks/oncall.md#Vici2ESLConnectionDown"
          dashboard: "/d/freeswitch"
