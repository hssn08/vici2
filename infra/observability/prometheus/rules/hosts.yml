# vici2 — host-level alerts via node_exporter.
# Source: spec/modules/O01/PLAN.md §3.7.

groups:
  - name: vici2_hosts
    interval: 30s
    rules:

      - alert: Vici2HostCPUSaturated
        expr: |
          1 - avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m]))
          > 0.85
        for: 10m
        labels:
          severity: warn
          team: oncall
        annotations:
          summary: "CPU > 85% on {{ $labels.instance }}"
          description: "Sustained CPU saturation. Investigate top processes."
          runbook: "https://repo/spec/runbooks/oncall.md#Vici2HostCPUSaturated"
          dashboard: "/d/hosts"

      - alert: Vici2HostMemPressure
        expr: |
          node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes
          < 0.10
        for: 10m
        labels:
          severity: warn
          team: oncall
        annotations:
          summary: "MemAvailable < 10% on {{ $labels.instance }}"
          description: "OOM risk. Check leaks and large processes."
          runbook: "https://repo/spec/runbooks/oncall.md#Vici2HostMemPressure"
          dashboard: "/d/hosts"

      - alert: Vici2HostDiskFillingFast
        expr: |
          predict_linear(
            node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"}[6h],
            24 * 3600
          ) < 0
        for: 30m
        labels:
          severity: warn
          team: oncall
        annotations:
          summary: "Disk {{ $labels.mountpoint }} on {{ $labels.instance }} predicted full < 24h"
          description: "Linear extrapolation from last 6h of avail-bytes."
          runbook: "https://repo/spec/runbooks/oncall.md#Vici2HostDiskFillingFast"
          dashboard: "/d/hosts"

      - alert: Vici2HostDiskCritical
        expr: |
          node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"}
          / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}
          < 0.05
        for: 5m
        labels:
          severity: page
          team: oncall
        annotations:
          summary: "Disk {{ $labels.mountpoint }} on {{ $labels.instance }} < 5% free"
          description: "Imminent filesystem-full. MySQL/recordings/Prometheus all at risk."
          runbook: "https://repo/spec/runbooks/oncall.md#Vici2HostDiskCritical"
          dashboard: "/d/hosts"

      - alert: Vici2HostDown
        expr: up{job="vici2-node-exporter"} == 0
        for: 2m
        labels:
          severity: page
          team: oncall
        annotations:
          summary: "node_exporter unreachable on {{ $labels.instance }}"
          description: "Host metrics not flowing — either node_exporter or the host itself is down."
          runbook: "https://repo/spec/runbooks/oncall.md#Vici2HostDown"
          dashboard: "/d/hosts"
