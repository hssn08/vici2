# vici2 — Alertmanager 0.27+ routing config.
# Source: spec/modules/O01/PLAN.md §9, O03.
#
# O03: webhook receivers POST to api /internal/alerts/webhook, which
# fans out to per-tenant alert_receivers (Slack, PagerDuty, webhook)
# via BullMQ. X-Internal-Secret header required by the api endpoint.
#
# Set ALERTMANAGER_INTERNAL_SECRET in .env (must match INTERNAL_SECRET).

global:
  resolve_timeout: 5m

route:
  receiver: webhook-default
  group_by: [alertname, tenant_id, campaign_id]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  routes:
    - matchers:
        - severity="page"
      receiver: webhook-page
      group_wait: 10s
      group_interval: 5m
      repeat_interval: 4h
      continue: false
    - matchers:
        - severity="warn"
      receiver: webhook-warn
      continue: false
    - matchers:
        - severity="info"
      receiver: webhook-info
      group_interval: 6h
      repeat_interval: 24h

receivers:
  # O03: webhook receivers → api fan-out engine → alert_receivers table.
  # INTERNAL_SECRET must match the api's INTERNAL_SECRET env var.
  - name: webhook-default
    webhook_configs:
      - url: http://api:3000/internal/alerts/webhook
        send_resolved: true
        http_config:
          headers:
            X-Internal-Secret: "${ALERTMANAGER_INTERNAL_SECRET}"

  - name: webhook-page
    webhook_configs:
      - url: http://api:3000/internal/alerts/webhook?severity=page
        send_resolved: true
        http_config:
          headers:
            X-Internal-Secret: "${ALERTMANAGER_INTERNAL_SECRET}"

  - name: webhook-warn
    webhook_configs:
      - url: http://api:3000/internal/alerts/webhook?severity=warn
        send_resolved: true
        http_config:
          headers:
            X-Internal-Secret: "${ALERTMANAGER_INTERNAL_SECRET}"

  - name: webhook-info
    webhook_configs:
      - url: http://api:3000/internal/alerts/webhook?severity=info
        send_resolved: false
        http_config:
          headers:
            X-Internal-Secret: "${ALERTMANAGER_INTERNAL_SECRET}"

  # --- Phase 2 receivers (commented out; require secret rollout) ---
  # - name: pagerduty-and-slack
  #   pagerduty_configs:
  #     - service_key: ${PAGERDUTY_SERVICE_KEY}
  #       description: "{{ .CommonLabels.alertname }} - {{ .CommonAnnotations.summary }}"
  #       details:
  #         runbook:   "{{ .CommonAnnotations.runbook }}"
  #         dashboard: "{{ .CommonAnnotations.dashboard }}"
  #         campaign:  "{{ .CommonLabels.campaign_id }}"
  #   slack_configs:
  #     - api_url: ${SLACK_WEBHOOK_URL}
  #       channel: "#oncall"
  #       send_resolved: true

inhibit_rules:
  # FreeSwitchDown swallows derivative alerts.
  - source_matchers:
      - alertname="Vici2FreeSwitchDown"
    target_matchers:
      - alertname=~"Vici2(ESL.*|HopperStarved|HopperFloor|DropRate.*|FSConferenceLeak|DialerOriginateLatencyHigh)"
    equal: [fs_host]

  # RedisDown swallows hopper alerts (hopper lives in Redis).
  - source_matchers:
      - alertname="Vici2RedisDown"
    target_matchers:
      - alertname=~"Vici2Hopper.*"

  # MySQLDown swallows drop-rate alerts (audit numerators live in MySQL).
  - source_matchers:
      - alertname="Vici2MySQLDown"
    target_matchers:
      - alertname=~"Vici2DropRate.*"
