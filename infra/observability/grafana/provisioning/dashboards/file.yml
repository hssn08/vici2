# vici2 — Grafana dashboard provisioning (file provider).
# Source: spec/modules/O01/PLAN.md §8.1.

apiVersion: 1

providers:
  - name: vici2-default
    orgId: 1
    folder: ''
    folderUid: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
